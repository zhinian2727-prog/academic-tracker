<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学术前沿追踪 | Academic Frontier Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Serif+SC:wght@400;600;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0f172a;
            --accent: #3b82f6;
            --warning: #f59e0b;
            --danger: #ef4444;
            --success: #10b981;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
            min-height: 100vh;
        }
        
        .serif-cn { font-family: 'Noto Serif SC', serif; }
        .serif-en { font-family: 'Crimson Text', Georgia, serif; }
        
        /* 玻璃拟态 */
        .glass {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        
        /* 论文卡片 */
        .paper-card {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            border-left: 4px solid transparent;
        }
        
        .paper-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.1);
        }
        
        .paper-card.sufficient { border-left-color: var(--success); }
        .paper-card.warning { border-left-color: var(--warning); }
        .paper-card.danger { border-left-color: var(--danger); }
        
        /* 双栏摘要布局 */
        .bilingual-abstract {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }
        
        @media (max-width: 768px) {
            .bilingual-abstract {
                grid-template-columns: 1fr;
            }
        }
        
        /* 语言标签 */
        .lang-badge {
            font-size: 0.65rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            padding: 0.25rem 0.5rem;
            border-radius: 0.25rem;
        }
        
        .lang-en { background: #dbeafe; color: #1e40af; }
        .lang-zh { background: #dcfce7; color: #166534; }
        .lang-short { background: #fee2e2; color: #991b1b; }
        
        /* 展开动画 */
        .abstract-collapsed {
            max-height: 200px;
            overflow: hidden;
            position: relative;
        }
        
        .abstract-collapsed::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 80px;
            background: linear-gradient(transparent, white);
            pointer-events: none;
        }
        
        .abstract-expanded {
            max-height: none;
        }
        
        .abstract-expanded::after {
            display: none;
        }
        
        /* 短摘要警告框 */
        .short-abstract-alert {
            background: linear-gradient(135deg, #fef3c7 0%, #fde68a 100%);
            border: 2px dashed #f59e0b;
        }
        
        /* 分类标签 */
        .category-badge {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-size: 0.75rem;
            font-weight: 600;
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
        }
        
        /* 方法标签 */
        .method-badge {
            font-family: 'Courier New', monospace;
            background: #f3f4f6;
            border: 1px solid #e5e7eb;
            color: #374151;
            font-size: 0.75rem;
            padding: 0.125rem 0.5rem;
            border-radius: 0.25rem;
        }
        
        /* 加载动画 */
        .skeleton {
            background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }
        
        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
        
        /* 标签页 */
        .tab-active {
            background: #0f172a;
            color: white;
        }
        
        .tab-inactive {
            background: white;
            color: #64748b;
            border: 1px solid #e2e8f0;
        }
        
        .tab-inactive:hover {
            background: #f8fafc;
            color: #0f172a;
        }
    </style>
</head>
<body class="text-slate-800">

    <!-- 导航栏 -->
    <nav class="glass fixed w-full z-50 top-0 border-b border-slate-200">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <div class="flex items-center space-x-3">
                    <div class="w-10 h-10 bg-gradient-to-br from-blue-600 to-indigo-600 rounded-xl flex items-center justify-center text-white font-bold text-xl shadow-lg">
                        学
                    </div>
                    <div>
                        <h1 class="text-xl font-bold text-slate-900 tracking-tight serif-cn">学术前沿追踪</h1>
                        <p class="text-xs text-slate-500">Political Science & Economics</p>
                    </div>
                </div>
                <div class="flex items-center space-x-4">
                    <span class="px-3 py-1 bg-green-100 text-green-700 rounded-full text-xs font-medium" id="last-update">
                        加载中...
                    </span>
                    <button onclick="refreshData()" class="p-2 hover:bg-slate-100 rounded-lg transition-colors" title="刷新数据">
                        <svg class="w-5 h-5 text-slate-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path>
                        </svg>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <!-- 主内容 -->
    <main class="pt-24 pb-12 px-4 sm:px-6 lg:px-8 max-w-7xl mx-auto">
        
        <!-- 统计卡片 -->
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
            <div class="glass rounded-2xl p-5 shadow-sm">
                <p class="text-xs text-slate-500 uppercase tracking-wider mb-1">今日论文</p>
                <p class="text-2xl font-bold text-slate-900" id="stat-total">0</p>
            </div>
            <div class="glass rounded-2xl p-5 shadow-sm">
                <p class="text-xs text-slate-500 uppercase tracking-wider mb-1">摘要完整</p>
                <p class="text-2xl font-bold text-green-600" id="stat-sufficient">0</p>
            </div>
            <div class="glass rounded-2xl p-5 shadow-sm">
                <p class="text-xs text-slate-500 uppercase tracking-wider mb-1">摘要过短</p>
                <p class="text-2xl font-bold text-amber-600" id="stat-short">0</p>
            </div>
            <div class="glass rounded-2xl p-5 shadow-sm">
                <p class="text-xs text-slate-500 uppercase tracking-wider mb-1">分类数</p>
                <p class="text-2xl font-bold text-blue-600" id="stat-categories">0</p>
            </div>
        </div>

        <!-- 筛选栏 -->
        <div class="glass rounded-2xl p-4 mb-6 shadow-sm">
            <div class="flex flex-wrap gap-3 items-center justify-between">
                <div class="flex flex-wrap gap-2">
                    <button onclick="filterPapers('all')" class="tab-active px-4 py-2 rounded-lg text-sm font-medium transition-all" data-filter="all">
                        全部论文
                    </button>
                    <button onclick="filterPapers('sufficient')" class="tab-inactive px-4 py-2 rounded-lg text-sm font-medium transition-all" data-filter="sufficient">
                        摘要完整 ✅
                    </button>
                    <button onclick="filterPapers('short')" class="tab-inactive px-4 py-2 rounded-lg text-sm font-medium transition-all" data-filter="short">
                        摘要过短 ⚠️
                    </button>
                </div>
                <div class="flex items-center space-x-2">
                    <select id="category-select" onchange="filterByCategory()" class="px-3 py-2 rounded-lg border border-slate-200 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 bg-white">
                        <option value="all">所有分类</option>
                    </select>
                    <input type="text" id="search-input" placeholder="搜索标题、作者、期刊..." 
                        class="px-4 py-2 rounded-lg border border-slate-200 focus:outline-none focus:ring-2 focus:ring-blue-500 w-64 text-sm"
                        onkeyup="searchPapers()">
                </div>
            </div>
        </div>

        <!-- 论文列表 -->
        <div id="papers-container" class="space-y-6">
            <!-- 动态生成 -->
        </div>

        <!-- 空状态 -->
        <div id="empty-state" class="hidden text-center py-20">
            <div class="text-6xl mb-4">📭</div>
            <h3 class="text-lg font-medium text-slate-900 mb-2">暂无符合条件的论文</h3>
            <p class="text-slate-500">尝试调整筛选条件</p>
        </div>

    </main>

    <!-- 页脚 -->
    <footer class="border-t border-slate-200 bg-white mt-12">
        <div class="max-w-7xl mx-auto px-4 py-6 text-center text-sm text-slate-500">
            <p>自动抓取自政治学、经济学顶刊 RSS • 每日更新</p>
            <p class="mt-1">数据来源: ArXiv, Cambridge, Taylor & Francis, ScienceDirect 等</p>
        </div>
    </footer>

    <script>
        // 数据存储
        let allPapers = [];
        let currentFilter = 'all';
        let currentCategory = 'all';
        
        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            loadData();
        });

        // 加载JSON数据
        async function loadData() {
            try {
                // 尝试加载 latest.json
                const response = await fetch('journal_data/latest.json');
                const data = await response.json();
                
                // 扁平化数据
                allPapers = [];
                Object.entries(data.categories).forEach(([catName, catData]) => {
                    catData.papers.forEach(paper => {
                        allPapers.push({
                            ...paper,
                            category: catName,
                            categoryDesc: catData.description
                        });
                    });
                });
                
                // 更新UI
                document.getElementById('last-update').textContent = `更新于 ${data.date}`;
                updateStats();
                populateCategories(Object.keys(data.categories));
                renderPapers();
                
            } catch (error) {
                console.error('加载数据失败:', error);
                document.getElementById('papers-container').innerHTML = `
                    <div class="text-center py-12 text-red-600">
                        <p>加载数据失败，请检查网络连接</p>
                        <p class="text-sm mt-2 text-slate-500">${error.message}</p>
                    </div>
                `;
            }
        }

        // 更新统计
        function updateStats() {
            const total = allPapers.length;
            const sufficient = allPapers.filter(p => p.abstract_sufficient).length;
            const short = total - sufficient;
            const categories = new Set(allPapers.map(p => p.category)).size;
            
            document.getElementById('stat-total').textContent = total;
            document.getElementById('stat-sufficient').textContent = sufficient;
            document.getElementById('stat-short').textContent = short;
            document.getElementById('stat-categories').textContent = categories;
        }

        // 填充分类下拉框
        function populateCategories(categories) {
            const select = document.getElementById('category-select');
            categories.forEach(cat => {
                const option = document.createElement('option');
                option.value = cat;
                option.textContent = cat;
                select.appendChild(option);
            });
        }

        // 渲染论文列表
        function renderPapers() {
            const container = document.getElementById('papers-container');
            const emptyState = document.getElementById('empty-state');
            const searchTerm = document.getElementById('search-input').value.toLowerCase();
            
            // 筛选逻辑
            let filtered = allPapers.filter(paper => {
                // 摘要长度筛选
                if (currentFilter === 'sufficient' && !paper.abstract_sufficient) return false;
                if (currentFilter === 'short' && paper.abstract_sufficient) return false;
                
                // 分类筛选
                if (currentCategory !== 'all' && paper.category !== currentCategory) return false;
                
                // 搜索
                if (searchTerm) {
                    const searchStr = `${paper.title} ${paper.authors} ${paper.journal}`.toLowerCase();
                    return searchStr.includes(searchTerm);
                }
                return true;
            });

            if (filtered.length === 0) {
                container.innerHTML = '';
                emptyState.classList.remove('hidden');
                return;
            }
            
            emptyState.classList.add('hidden');
            
            // 按分类分组渲染
            const grouped = filtered.reduce((acc, paper) => {
                if (!acc[paper.category]) acc[paper.category] = [];
                acc[paper.category].push(paper);
                return acc;
            }, {});
            
            container.innerHTML = Object.entries(grouped).map(([category, papers]) => `
                <div class="mb-8">
                    <div class="flex items-center gap-3 mb-4">
                        <h2 class="text-xl font-bold text-slate-900 serif-cn">${category}</h2>
                        <span class="text-sm text-slate-500">${papers[0].categoryDesc}</span>
                        <span class="bg-slate-200 text-slate-700 px-2 py-0.5 rounded-full text-xs font-medium">${papers.length}篇</span>
                    </div>
                    <div class="space-y-4">
                        ${papers.map(paper => renderPaperCard(paper)).join('')}
                    </div>
                </div>
            `).join('');
        }

        // 渲染单个论文卡片
        function renderPaperCard(paper) {
            const isShort = !paper.abstract_sufficient;
            const cardClass = isShort ? 'warning' : 'sufficient';
            const statusBadge = isShort ? 
                `<span class="lang-badge lang-short">摘要过短 ${paper.word_count || 0}词</span>` :
                `<span class="lang-badge" style="background:#dbeafe;color:#1e40af">摘要完整</span>`;
            
            // 处理短摘要的显示逻辑
            let abstractSection;
            if (isShort) {
                abstractSection = `
                    <div class="short-abstract-alert rounded-xl p-4 mt-3">
                        <div class="flex items-start gap-3">
                            <span class="text-2xl">⚠️</span>
                            <div class="flex-1">
                                <p class="font-medium text-amber-900 mb-1">摘要内容不足以进行分析</p>
                                <p class="text-sm text-amber-800 mb-2">
                                    当前摘要仅 ${paper.word_count || 0} 词 / ${paper.char_count || 0} 字符，
                                    低于分析阈值（50词/300字符）。
                                </p>
                                <div class="bg-white/50 rounded-lg p-3 text-sm text-slate-700 font-mono border border-amber-200/50">
                                    ${paper.abstract_en ? paper.abstract_en.substring(0, 200) + '...' : '无摘要内容'}
                                </div>
                                <div class="mt-3 flex gap-2">
                                    <a href="${paper.link}" target="_blank" class="inline-flex items-center gap-1 px-3 py-1.5 bg-amber-600 text-white rounded-lg text-xs font-medium hover:bg-amber-700 transition-colors">
                                        <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"></path></svg>
                                        访问原文获取完整摘要
                                    </a>
                                    <button onclick="retryFetch('${paper.id}')" class="px-3 py-1.5 border border-amber-600 text-amber-700 rounded-lg text-xs font-medium hover:bg-amber-50 transition-colors">
                                        重试获取
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            } else {
                // 正常双栏显示
                const abstractId = `abstract-${paper.id}`;
                abstractSection = `
                    <div class="mt-4 space-y-3">
                        <div class="flex items-center justify-between">
                            <div class="flex gap-2">
                                <span class="lang-badge lang-en">English Original</span>
                                <span class="lang-badge lang-zh">中文翻译</span>
                            </div>
                            ${paper.abstract_en && paper.abstract_en.length > 400 ? `
                            <button onclick="toggleAbstract('${abstractId}')" class="text-xs text-blue-600 hover:text-blue-800 font-medium flex items-center gap-1" id="btn-${abstractId}">
                                展开全文
                                <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                            </button>
                            ` : ''}
                        </div>
                        
                        <div id="${abstractId}" class="bilingual-abstract abstract-collapsed bg-slate-50 rounded-xl p-4 border border-slate-200">
                            <!-- 英文原文 -->
                            <div class="space-y-2">
                                <p class="serif-en text-sm text-slate-700 leading-relaxed">
                                    ${paper.abstract_en || 'No abstract available'}
                                </p>
                            </div>
                            
                            <!-- 中文翻译 -->
                            <div class="space-y-2 border-l border-slate-200 md:border-l-0 md:border-t border-dashed pl-4 md:pl-0 md:pt-4 md:mt-0 mt-4 pt-4">
                                <p class="serif-cn text-sm text-slate-800 leading-relaxed">
                                    ${paper.abstract_zh || '翻译加载中...'}
                                </p>
                            </div>
                        </div>
                    </div>
                `;
            }
            
            return `
            <article class="paper-card ${cardClass} glass rounded-2xl p-6 shadow-sm border border-slate-200 bg-white" data-id="${paper.id}">
                <div class="flex flex-col gap-4">
                    <!-- 头部信息 -->
                    <div class="flex justify-between items-start gap-4">
                        <div class="flex-1 min-w-0">
                            <div class="flex flex-wrap items-center gap-2 mb-2">
                                <span class="category-badge">${paper.category}</span>
                                ${statusBadge}
                                <span class="method-badge" title="识别的方法">${paper.method || 'N/A'}</span>
                            </div>
                            
                            <h3 class="text-lg font-bold text-slate-900 serif-cn leading-snug mb-2 hover:text-blue-700 transition-colors cursor-pointer" onclick="window.open('${paper.link}', '_blank')">
                                ${paper.title}
                            </h3>
                            
                            <div class="flex flex-wrap items-center gap-x-4 gap-y-1 text-sm text-slate-600">
                                <span class="flex items-center gap-1">
                                    <svg class="w-4 h-4 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
                                    ${paper.authors}
                                </span>
                                <span class="flex items-center gap-1">
                                    <svg class="w-4 h-4 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 20H5a2 2 0 01-2-2V6a2 2 0 012-2h10a2 2 0 012 2v1m2 13a2 2 0 01-2-2V7m2 13a2 2 0 002-2V9a2 2 0 00-2-2h-2m-4-3H9M7 16h6M7 8h6v4H7V8z"></path></svg>
                                    ${paper.journal}
                                </span>
                                <span class="flex items-center gap-1 text-slate-400">
                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                                    ${paper.published}
                                </span>
                            </div>
                        </div>
                        
                        <a href="${paper.link}" target="_blank" class="flex-shrink-0 p-2 hover:bg-slate-100 rounded-lg transition-colors text-slate-400 hover:text-blue-600" title="查看原文">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"></path></svg>
                        </a>
                    </div>
                    
                    <!-- 摘要区域 -->
                    ${abstractSection}
                </div>
            </article>
            `;
        }

        // 展开/收起摘要
        function toggleAbstract(id) {
            const el = document.getElementById(id);
            const btn = document.getElementById('btn-' + id);
            
            if (el.classList.contains('abstract-collapsed')) {
                el.classList.remove('abstract-collapsed');
                el.classList.add('abstract-expanded');
                btn.innerHTML = `
                    收起
                    <svg class="w-3 h-3 transform rotate-180" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                `;
            } else {
                el.classList.add('abstract-collapsed');
                el.classList.remove('abstract-expanded');
                btn.innerHTML = `
                    展开全文
                    <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                `;
            }
        }

        // 筛选功能
        function filterPapers(type) {
            currentFilter = type;
            
            document.querySelectorAll('[data-filter]').forEach(btn => {
                if (btn.dataset.filter === type) {
                    btn.classList.remove('tab-inactive');
                    btn.classList.add('tab-active');
                } else {
                    btn.classList.add('tab-inactive');
                    btn.classList.remove('tab-active');
                }
            });
            
            renderPapers();
        }

        // 分类筛选
        function filterByCategory() {
            currentCategory = document.getElementById('category-select').value;
            renderPapers();
        }

        // 搜索
        function searchPapers() {
            renderPapers();
        }

        // 重试获取（模拟）
        function retryFetch(paperId) {
            alert(`正在尝试重新获取论文 ${paperId} 的摘要...\n\n实际运行中会：\n1. 检查其他RSS源\n2. 尝试网页抓取\n3. 标记为待人工处理`);
        }

        // 刷新数据
        function refreshData() {
            const btn = document.querySelector('button[onclick="refreshData()"]');
            btn.classList.add('animate-spin');
            loadData().then(() => {
                btn.classList.remove('animate-spin');
            });
        }
    </script>
</body>
</html>
